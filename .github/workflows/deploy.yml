name: ConstructAI CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check syntax
      run: |
        python -m py_compile api.py
        python -m py_compile app/generator.py
        python -m py_compile app/planner_agent.py
        python -m py_compile app/pdf_exporter.py
        python -m py_compile app/vector_store.py
        echo " All files passed syntax check"

    - name: Build Docker image
      run: |
        docker build -t constructai:latest .
        echo " Docker image built successfully"

    - name: Verify Docker image
      run: |
        docker images | grep constructai
        echo " Image verified"